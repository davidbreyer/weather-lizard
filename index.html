<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Weather Lizard shows today's local weather in morning, afternoon, evening, and overnight blocks using the National Weather Service API."
    />
    <meta name="theme-color" content="#1769e0" />
    <meta property="og:title" content="Weather Lizard" />
    <meta
      property="og:description"
      content="A four-part local day forecast powered by the National Weather Service API."
    />
    <meta property="og:type" content="website" />
    <title>Weather Lizard</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="app-shell" aria-label="Weather Lizard dashboard">
        <header class="topbar">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 64 52" focusable="false">
                <circle class="brand-sun" cx="42" cy="14" r="8" />
                <path class="brand-lizard" d="M12 33c5-14 17-22 30-18 9 3 14 10 12 18-2 9-11 14-22 12-8-1-14-5-17-11" />
                <path class="brand-tail" d="M12 33c-5 2-8 5-9 9 6 0 11-2 15-6" />
                <path class="brand-leg" d="M27 23l-7-6M34 42l-5 7M43 24l7-5M47 39l8 4" />
              </svg>
            </span>
            <span>Weather Lizard</span>
          </div>

          <div class="place-row">
            <div class="place">
              <span aria-hidden="true" data-icon="pin"></span>
              <span id="locationLabel">Your location</span>
            </div>
            <div id="dateLabel" class="date">Today</div>
          </div>

          <div class="actions">
            <button id="refreshButton" class="location-button" type="button">
              <span aria-hidden="true" data-icon="target"></span>
              <span>Get my weather</span>
            </button>
          </div>
        </header>

        <section class="status-strip" aria-live="polite">
          <p id="statusMessage" class="status-message status-message--info">
            Click the button to allow location access and load your local forecast.
          </p>
          <p id="lastLoadedLabel" class="last-loaded-label">No weather data loaded yet.</p>
        </section>

        <section id="alertsSection" class="alerts-banner hidden" aria-live="polite">
          <div>
            <strong id="alertsTitle">Active alerts</strong>
            <span id="alertsSummary"></span>
          </div>
          <button id="alertsToggle" class="text-button" type="button" aria-expanded="false">
            Show details
          </button>
          <div id="alertsList" class="alerts-list" hidden></div>
        </section>

        <section id="forecastGrid" class="forecast-grid" aria-live="polite"></section>

        <section id="bottomStrip" class="bottom-strip" aria-label="Current weather details"></section>

        <footer class="site-footer">
          <span>Weather data from the</span>
          <a
            href="https://www.weather.gov/documentation/services-web-api"
            target="_blank"
            rel="noreferrer"
          >National Weather Service API</a>.
        </footer>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
